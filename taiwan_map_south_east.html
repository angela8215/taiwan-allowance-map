<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣南部及東部地區真實地理分佈津貼地圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between antialiased">

<header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <a href="index.html" class="inline-flex items-center gap-2 text-slate-600 hover:text-teal-600 transition-colors font-semibold text-sm">
            <span>⬅</span> 返回首頁導覽
        </a>
        <div class="flex items-center gap-3">
            <button class="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-all shadow-sm hover:shadow-md flex items-center gap-1" onclick="triggerSave()">
                💾 儲存數據
            </button>
            <button class="bg-rose-50 hover:bg-rose-100 text-rose-600 px-4 py-2 rounded-xl text-sm font-semibold transition-all flex items-center gap-1" onclick="triggerReset()">
                🧹 重設數據
            </button>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex-grow w-full">
    <!-- 雙欄排版區：左數據側欄、右地圖主欄 -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
        <!-- 左側：數據排行與設定面版 -->
        <div class="lg:col-span-5 bg-white rounded-2xl border border-slate-200 shadow-sm p-6 flex flex-col h-[calc(100vh-240px)] min-h-[500px]">
            <h2 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
                <span>📊</span> 南部東部排行面版
            </h2>
            <div class="mb-4">
                <label for="county-select" class="block text-xs font-bold text-slate-400 uppercase mb-2">請選擇南部/東部縣市</label>
                <select id="county-select" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 font-medium focus:outline-none focus:border-teal-500 transition-colors cursor-pointer">
                    <option value="高雄市" selected>高雄市（完整地理拓撲）</option>
                    <option value="臺南市">臺南市（完整地理拓撲）</option>
                    <option value="嘉義市">嘉義市（完整地理拓撲）</option>
                    <option value="嘉義縣">嘉義縣（完整地理拓撲）</option>
                    <option value="屏東縣">屏東縣（完整地理拓撲）</option>
                    <option value="花蓮縣">花蓮縣（完整地理拓撲）</option>
                    <option value="臺東縣">臺東縣（完整地理拓撲）</option>
                </select>
            </div>
            
            <div class="flex-grow overflow-y-auto border border-slate-100 rounded-xl">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 sticky top-0 z-10 border-b border-slate-100">
                        <tr>
                            <th class="px-4 py-3 text-xs font-bold text-slate-400 uppercase">行政區</th>
                            <th class="px-4 py-3 text-xs font-bold text-slate-400 uppercase text-right">津貼金額 (元)</th>
                        </tr>
                    </thead>
                    <tbody id="input-table-body" class="divide-y divide-slate-50">
                        <!-- 動態渲染 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 右側：地圖展示面版 -->
        <div class="lg:col-span-7 bg-white rounded-2xl border border-slate-200 shadow-sm p-6 flex flex-col justify-between position-relative h-[calc(100vh-240px)] min-h-[500px]">
            <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                <h2 id="map-title" class="text-lg font-bold text-slate-900">真實地理分佈熱圖</h2>
                <div class="flex items-center gap-2 bg-slate-50 border border-slate-150 px-4 py-1.5 rounded-full text-xs font-medium text-slate-500">
                    <span>低津貼</span>
                    <div class="w-20 h-2.5 rounded-full bg-gradient-to-r from-slate-100 to-teal-800"></div>
                    <span>高津貼</span>
                </div>
            </div>
            
            <div class="flex-grow flex items-center justify-center bg-slate-50 rounded-xl border border-slate-100 p-4 relative overflow-hidden">
                <svg id="taiwan-svg" class="w-full h-full max-h-[60vh]" viewBox="0 0 600 600">
                    <g id="map-features-group"></g>
                    <g id="map-labels-group"></g>
                </svg>
                <div id="map-tooltip" class="absolute pointer-events-none hidden bg-slate-900/95 text-white text-xs px-3 py-2 rounded-xl shadow-xl border border-white/10 z-50 transition-all duration-100 line-height-relaxed"></div>
            </div>
        </div>
    </div>
</main>

<div id="toast" class="fixed bottom-5 right-5 z-50 transform translate-y-10 opacity-0 pointer-events-none transition-all duration-300 flex items-center gap-2 bg-slate-900 text-white px-5 py-3.5 rounded-2xl shadow-2xl border border-white/10">
    <span class="text-base" id="toast-icon">💾</span>
    <span class="text-xs font-semibold" id="toast-message">數據已儲存</span>
</div>

<div id="confirm-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white rounded-3xl p-6 shadow-2xl border border-slate-200 max-w-sm w-full mx-4 transform scale-90 transition-transform duration-300" id="modal-box">
        <div class="w-12 h-12 rounded-2xl bg-rose-100 text-rose-600 flex items-center justify-center text-xl mb-4">⚠️</div>
        <h3 class="text-lg font-bold text-slate-900 mb-2">確定要重設數據嗎？</h3>
        <p class="text-sm text-slate-500 mb-6 leading-relaxed">重設後，所有南部及東部行政區已填寫的津貼數據將會歸零，此動作無法復原。</p>
        <div class="flex gap-3 justify-end">
            <button class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-xs font-bold transition-all" onclick="closeConfirmModal()">取消</button>
            <button class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm shadow-rose-600/10" id="confirm-yes-btn">確定重設</button>
        </div>
    </div>
</div>

<footer class="bg-white border-t border-slate-200 py-4 text-center text-xs text-slate-400">
    <div>© 2026 台灣地理分佈動態熱圖系統 · 南部及東部地區</div>
</footer>

            { id: "cyc-pz", name: "朴子市", center: [140, 240], path: "M 100,220 L 170,220 L 160,290 L 100,290 Z" },
            { id: "cyc-ms", name: "民雄鄉", center: [310, 150], path: "M 260,120 L 360,120 L 350,190 L 260,190 Z" },

        ],

            { id: "hun-xf", name: "新城秀林", center: [240, 190], path: "M 150,100 L 320,100 L 280,280 L 160,260 Z" },
            { id: "hun-sf", name: "壽豐光復", center: [280, 310], path: "M 200,260 L 350,240 L 320,380 L 210,380 Z" },
            { id: "hun-yl", name: "玉里富里", center: [240, 480], path: "M 160,380 L 320,380 L 280,580 L 150,560 Z" }
        ],
        "臺東縣": [
            { id: "ttc-tt", name: "臺東市卑南", center: [260, 250], path: "M 180,200 L 320,200 L 290,320 L 190,320 Z" },
            { id: "ttc-cg", name: "成功長濱", center: [330, 120], path: "M 280,60 L 390,60 L 360,180 L 290,180 Z" },
            { id: "ttc-gs", name: "關山池上", center: [240, 110], path: "M 180,80 L 290,80 L 280,160 L 190,160 Z" },
            { id: "ttc-tml", name: "太麻里大武", center: [200, 420], path: "M 140,320 L 260,320 L 220,530 L 130,510 Z" }
        ]
    };

    let localState = {};

    function initAppState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                localState = JSON.parse(saved);
                for (const county in geographicDB) {
                    if (!localState[county]) localState[county] = {};
                    geographicDB[county].forEach(dist => {
                        if (localState[county][dist.id] === undefined) {
                            localState[county][dist.id] = 0;
                        }
                    });
                }
                return;
            } catch (e) {
                console.error("載入南部東部舊有數據失敗，將重新初始化", e);
            }
        }

        for (const county in geographicDB) {
            localState[county] = {};
            geographicDB[county].forEach(dist => {
                localState[county][dist.id] = 0;
            });
        }
    }

    function showToast(message, icon = "💾") {
        const toast = document.getElementById('toast');
        document.getElementById('toast-icon').innerText = icon;
        document.getElementById('toast-message').innerText = message;
        
        toast.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
        toast.classList.add('opacity-100', 'translate-y-0');
        
        setTimeout(() => {
            toast.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
            toast.classList.remove('opacity-100', 'translate-y-0');
        }, 2500);
    }

    let onConfirmAction = null;
    function openConfirmModal(onConfirm) {
        onConfirmAction = onConfirm;
        const modal = document.getElementById('confirm-modal');
        const box = document.getElementById('modal-box');
        
        modal.classList.remove('opacity-0', 'pointer-events-none');
        box.classList.remove('scale-90');
        box.classList.add('scale-100');
    }

    function closeConfirmModal() {
        const modal = document.getElementById('confirm-modal');
        const box = document.getElementById('modal-box');
        
        modal.classList.add('opacity-0', 'pointer-events-none');
        box.classList.remove('scale-100');
        box.classList.add('scale-90');
    }

    document.getElementById('confirm-yes-btn').onclick = () => {
        if (onConfirmAction) onConfirmAction();
        closeConfirmModal();
    };

    function triggerSave() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(localState));
        showToast("南部東部數據已成功儲存！", "✨");
    }

    function triggerReset() {
        openConfirmModal(() => {
            localStorage.removeItem(STORAGE_KEY);
            for (const county in geographicDB) {
                localState[county] = {};
                geographicDB[county].forEach(dist => {
                    localState[county][dist.id] = 0;
                });
            }
            const selected = document.getElementById('county-select').value;
            renderInputPanel(selected);
            renderSVGMap(selected);
            showToast("數據已成功重設！", "🧹");
        });
    }

    function calculateGradientColor(val, min, max) {
        if (max === min || max === 0) return "#f8fafc";
        const ratio = (val - min) / (max - min);
        const r = Math.round(241 + (17 - 241) * ratio);
        const g = Math.round(245 + (148 - 245) * ratio);
        const b = Math.round(249 + (136 - 249) * ratio);
        return `rgb(${r}, ${g}, ${b})`;
    }

    function updateStats(county) {
        const values = Object.values(localState[county]);
        const total = values.reduce((sum, v) => sum + v, 0);
        const average = values.length ? Math.round(total / values.length) : 0;
        
        let maxVal = -1;
        let maxDistName = "-";
        geographicDB[county].forEach(dist => {
            const val = localState[county][dist.id] || 0;
            if (val > maxVal) {
                maxVal = val;
                maxDistName = dist.name;
            }
        });

        const totalEl = document.getElementById('stats-total');
        const avgEl = document.getElementById('stats-average');
        const maxEl = document.getElementById('stats-max');

        if (totalEl) totalEl.innerText = `$${total.toLocaleString()} 元`;
        if (avgEl) avgEl.innerText = `$${average.toLocaleString()} 元`;
        if (maxEl) maxEl.innerText = maxVal > 0 ? `${maxDistName} ($${maxVal.toLocaleString()})` : "-";
    }

    function updateHeatmap(county) {
        const values = Object.values(localState[county]);
        const max = Math.max(...values, 0);
        const min = Math.min(...values, 0);

        geographicDB[county].forEach(dist => {
            const polygon = document.getElementById(dist.id);
            if (polygon) {
                const val = localState[county][dist.id] || 0;
                polygon.setAttribute('fill', calculateGradientColor(val, min, max));
            }
            const valLabel = document.getElementById(`val-${dist.id}`);
            if (valLabel) {
                const val = localState[county][dist.id] || 0;
                valLabel.textContent = `$${val.toLocaleString()}`;
            }
        });
        updateStats(county);
    }

    function renderInputPanel(county) {
        const tbody = document.getElementById('input-table-body');
        tbody.innerHTML = '';

        const sortedDistricts = [...geographicDB[county]].sort((a, b) => {
            return (localState[county][b.id] || 0) - (localState[county][a.id] || 0);
        });

        sortedDistricts.forEach(dist => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition-colors";
            
            const tdName = document.createElement('td');
            tdName.className = "px-4 py-3 text-sm font-semibold text-slate-700";
            tdName.innerText = dist.name;
            
            const tdInput = document.createElement('td');
            tdInput.className = "px-4 py-3 text-right";
            
            const input = document.createElement('input');
            input.type = 'number';
            input.className = 'w-28 bg-slate-50 border border-slate-200 focus:border-teal-500 focus:bg-white text-right px-3 py-1.5 rounded-lg text-sm font-semibold text-slate-800 transition-all outline-none focus:ring-2 focus:ring-teal-500/10';
            input.value = localState[county][dist.id] || 0;
            
            input.oninput = (e) => {
                localState[county][dist.id] = parseFloat(e.target.value) || 0;
                updateHeatmap(county);
            };
            input.onblur = () => { renderInputPanel(county); };
            input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };

            tdInput.appendChild(input);
            tr.appendChild(tdName);
            tr.appendChild(tdInput);
            tbody.appendChild(tr);
        });
    }

    function renderSVGMap(county) {
        const featuresGroup = document.getElementById('map-features-group');
        const labelsGroup = document.getElementById('map-labels-group');
        const tooltip = document.getElementById('map-tooltip');
        
        featuresGroup.innerHTML = '';
        labelsGroup.innerHTML = '';
        document.getElementById('map-title').innerText = `${county}真實地理分佈圖`;

        geographicDB[county].forEach(dist => {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute('d', dist.path);
            path.setAttribute('id', dist.id);
            path.setAttribute('class', 'stroke-white hover:stroke-slate-900 transition-all duration-200 cursor-pointer');
            path.setAttribute('stroke-width', '2');
            path.setAttribute('fill', '#f8fafc');
            
            path.onmousemove = (e) => {
                const currentVal = localState[county][dist.id] || 0;
                tooltip.classList.remove('hidden');
                tooltip.style.left = (e.offsetX + 15) + 'px';
                tooltip.style.top = (e.offsetY + 15) + 'px';
                tooltip.innerHTML = `<div class="font-bold text-slate-300 text-[10px] uppercase tracking-wider">${county}</div>
                                     <div class="text-sm font-extrabold mt-0.5">${dist.name}</div>
                                     <div class="text-xs text-teal-400 font-semibold mt-1">金額：$${currentVal.toLocaleString()} 元</div>`;
            };
            path.onmouseleave = () => { tooltip.classList.add('hidden'); };

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute('x', dist.center[0]);
            text.setAttribute('y', dist.center[1]);
            text.setAttribute('class', 'text-[11px] font-extrabold fill-slate-800 pointer-events-none text-center select-none');
            text.setAttribute('text-anchor', 'middle');
            text.setAttribute('dominant-baseline', 'middle');

            // 區域名稱子行
            const tspanName = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
            tspanName.setAttribute('x', dist.center[0]);
            tspanName.setAttribute('dy', '-5');
            tspanName.textContent = dist.name;

            const tspanVal = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
            tspanVal.setAttribute('x', dist.center[0]);
            tspanVal.setAttribute('dy', '13');
            tspanVal.setAttribute('id', `val-${dist.id}`);
            tspanVal.setAttribute('class', 'fill-slate-500 font-medium text-[9px]');
            tspanVal.textContent = `$${(localState[county][dist.id] || 0).toLocaleString()}`;

            text.appendChild(tspanName);
            text.appendChild(tspanVal);

            featuresGroup.appendChild(path);
            labelsGroup.appendChild(text);
        });

        updateHeatmap(county);
    }

    document.getElementById('county-select').onchange = (e) => {
        const selected = e.target.value;
        renderInputPanel(selected);
        renderSVGMap(selected);
    };

    initAppState();
    renderInputPanel("高雄市");
    renderSVGMap("高雄市");
</script>
</body>
</html>
