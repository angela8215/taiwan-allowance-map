<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SP 2026 南部津貼</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #0d9488;
            --bg: #f1f5f9;
            --panel-bg: #ffffff;
            --border: #cbd5e1;
            --text: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
        }
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 430px 1fr;
            gap: 25px;
            height: 93vh;
        }
        @media (max-width: 1024px) {
            .app-container { grid-template-columns: 1fr; height: auto; }
        }
        .sidebar {
            background: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        h2 { margin-top: 0; color: var(--primary); font-size: 1.35rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #475569; font-size: 0.95rem; }
        select { width: 100%; padding: 11px; border-radius: 8px; border: 1px solid var(--border); font-size: 1rem; background: #fff; cursor: pointer; color: var(--primary); font-weight: 500; }
        select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(13,148,136,0.15); }
        
        .data-table-container {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 5px;
        }
        .data-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        .data-table th, .data-table td { padding: 11px 14px; border-bottom: 1px solid #f8fafc; }
        .data-table th { background: #f8fafc; position: sticky; top: 0; z-index: 10; color: #64748b; font-weight: 600; border-bottom: 1px solid #e2e8f0; }
        .allowance-input {
            width: 110px;
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            text-align: right;
            font-size: 0.95rem;
            color: var(--primary);
            font-weight: 500;
        }
        .allowance-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(13,148,136,0.15); }

        .map-panel {
            background: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #e2e8f0;
        }
        .map-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; }
        .legend { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; background: #f8fafc; padding: 6px 16px; border-radius: 20px; border: 1px solid #e2e8f0; font-weight: 500; }
        .legend-bar { width: 140px; height: 12px; background: linear-gradient(to right, #f1f5f9, #115e59); border-radius: 6px; }
        
        .map-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #edf2f7;
            padding: 10px;
        }
        svg { width: 100%; height: 100%; max-height: 72vh; }
        .district-poly { stroke: #ffffff; stroke-width: 1.8; transition: fill 0.2s ease, stroke 0.2s ease; cursor: pointer; }
        .district-poly:hover { stroke: #0f172a; stroke-width: 2.8; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.15)); }
        .map-label { font-size: 11px; font-weight: bold; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; pointer-events: none; text-shadow: 0px 0px 4px #ffffff, 0px 0px 6px #ffffff; }
        .tooltip { position: absolute; background: rgba(15, 23, 42, 0.95); color: white; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; pointer-events: none; display: none; z-index: 1000; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.1); line-height: 1.5; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h2>📊 南部/東部區域</h2>
        <div class="form-group">
            <label for="county-select">請選擇南部/東部縣市：</label>
            <select id="county-select">
                <option value="高雄市" selected>高雄市</option>
                <option value="臺南市">臺南市</option>
                <option value="嘉義市">嘉義市</option>
                <option value="嘉義縣">嘉義縣</option>
                <option value="屏東縣">屏東縣</option>
                <option value="花蓮縣">花蓮縣</option>
                <option value="臺東縣">臺東縣</option>
            </select>
        </div>
        
        <label>各行政區津貼金額設定：</label>
        <div class="data-table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>行政區</th>
                        <th style="text-align: right;">津貼金額 (元)</th>
                    </tr>
                </thead>
                <tbody id="input-table-body"></tbody>
            </table>
        </div>
    </div>

    <div class="map-panel">
        <div class="map-header">
            <h2 id="map-title">區域真實地理分布</h2>
            <div class="legend">
                <span>低津貼</span>
                <div class="legend-bar"></div>
                <span>高津貼</span>
            </div>
        </div>
        
        <div class="map-wrapper">
            <svg id="taiwan-svg" viewBox="0 0 600 600">
                <g id="map-features-group"></g>
                <g id="map-labels-group"></g>
            </svg>
        </div>
        <div class="tooltip" id="map-tooltip"></div>
    </div>
</div>

<script>
    const southEastGeographicDB = {
        "高雄市": [
            { id: "khh-ty", name: "桃源區", center: [420, 185], path: "M 340,170 L 460,70 L 540,180 L 430,300 Z" },
            { id: "khh-nms", name: "那瑪夏區", center: [290, 155], path: "M 250,140 L 340,110 L 340,190 L 270,210 Z" },
            { id: "khh-lg", name: "六龜區", center: [345, 295], path: "M 315,220 L 395,220 L 375,370 L 305,350 Z" },
            { id: "khh-ml", name: "茂林區", center: [415, 355], path: "M 385,300 L 475,280 L 465,410 L 375,370 Z" },
            { id: "khh-jx", name: "甲仙區", center: [275, 245], path: "M 245,210 L 315,210 L 305,290 L 245,275 Z" },
            { id: "khh-sl", name: "杉林區", center: [265, 320], path: "M 235,280 L 305,295 L 295,355 L 235,340 Z" },
            { id: "khh-nm", name: "內門區", center: [195, 315], path: "M 165,270 L 235,280 L 225,350 L 165,340 Z" },
            { id: "khh-mn", name: "美濃區", center: [275, 385], path: "M 235,355 L 315,365 L 305,425 L 235,415 Z" },
            { id: "khh-qs", name: "旗山區", center: [195, 395], path: "M 165,350 L 235,360 L 225,440 L 165,430 Z" },
            { id: "khh-gg", name: "岡山區", center: [115, 375], path: "M 85,340 L 145,350 L 140,405 L 85,395 Z" },
            { id: "khh-nz", name: "楠梓區", center: [105, 445], path: "M 75,420 L 135,425 L 130,465 L 75,465 Z" },
            { id: "khh-zy", name: "左營區", center: [100, 485], path: "M 75,465 L 130,465 L 125,505 L 75,505 Z" },
            { id: "khh-sm", name: "三民區", center: [115, 525], path: "M 85,505 L 155,505 L 145,545 L 85,545 Z" },
            { id: "khh-khhc", name: "前金苓雅", center: [65, 545], path: "M 35,515 L 95,515 L 95,575 L 35,575 Z" },
            { id: "khh-cj", name: "旗津區", center: [25, 565], path: "M 15,515 L 30,515 L 20,595 L 5,595 Z" },
            { id: "khh-qz", name: "前鎮區", center: [85, 585], path: "M 65,565 L 115,565 L 105,615 L 65,615 Z" },
            { id: "khh-xg", name: "小港區", center: [115, 635], path: "M 85,615 L 145,615 L 135,665 L 85,665 Z" },
            { id: "khh-fs", name: "鳳山區", center: [165, 545], path: "M 145,515 L 195,515 L 185,575 L 145,575 Z" },
            { id: "khh-dl", name: "大寮區", center: [215, 575], path: "M 195,525 L 245,535 L 235,625 L 185,615 Z" },
            { id: "khh-ly", name: "林園區", center: [205, 665], path: "M 175,625 L 235,625 L 225,695 L 175,695 Z" },
            { id: "khh-rw", name: "仁武鳥松", center: [165, 475], path: "M 135,435 L 195,445 L 185,505 L 135,505 Z" },
            { id: "khh-ds-town", name: "大樹區", center: [225, 485], path: "M 195,445 L 255,455 L 245,525 L 195,515 Z" }
        ],
        "臺南市": [
            { id: "tnn-cc", name: "中西區安平", center: [150, 240], path: "M 100,210 L 200,200 L 180,270 L 110,280 Z" },
            { id: "tnn-e", name: "東區", center: [240, 260], path: "M 200,200 L 280,180 L 270,310 L 180,270 Z" },
            { id: "tnn-s", name: "南區", center: [160, 330], path: "M 110,280 L 180,270 L 200,380 L 120,390 Z" },
            { id: "tnn-n", name: "北區安南", center: [150, 150], path: "M 100,100 L 210,120 L 200,190 L 100,190 Z" },
            { id: "tnn-yk", name: "永康區", center: [250, 150], path: "M 210,120 L 300,110 L 290,190 L 200,190 Z" },
            { id: "tnn-xy", name: "新營區", center: [280, 75], path: "M 240,50 L 320,50 L 310,100 L 240,100 Z" },
            { id: "tnn-sh", name: "善化新市", center: [340, 160], path: "M 300,110 L 380,110 L 370,210 L 290,190 Z" },
            { id: "tnn-rd", name: "仁德歸仁", center: [270, 360], path: "M 200,310 L 320,310 L 290,420 L 200,410 Z" }
        ],
        "嘉義市": [
            { id: "cyi-e", name: "東區", center: [320, 280], path: "M 250,200 L 400,200 L 380,360 L 250,360 Z" },
            { id: "cyi-w", name: "西區", center: [180, 280], path: "M 100,200 L 250,200 L 250,360 L 100,360 Z" }
        ],
        "嘉義縣": [
            { id: "cyc-tb", name: "太保市", center: [220, 200], path: "M 160,180 L 280,150 L 260,250 L 170,260 Z" },
            { id: "cyc-pz", name: "朴子市", center: [140, 240], path: "M 100,220 L 170,220 L 160,290 L 100,290 Z" },
            { id: "cyc-ms", name: "民雄鄉", center: [310, 150], path: "M 260,120 L 360,120 L 350,190 L 260,190 Z" },
            { id: "cyc-su", name: "水上鄉", center: [240, 310], path: "M 180,260 L 290,260 L 280,360 L 180,360 Z" },
            { id: "cyc-al", name: "阿里山鄉", center: [430, 330], path: "M 340,220 L 520,200 L 480,460 L 320,410 Z" }
        ],
        "屏東縣": [
            { id: "ptc-pt", name: "屏東市", center: [180, 150], path: "M 120,130 L 230,110 L 220,180 L 130,190 Z" },
            { id: "ptc-cz", name: "潮州萬丹", center: [180, 250], path: "M 130,190 L 230,180 L 220,310 L 130,310 Z" },
            { id: "ptc-dg", name: "東港林邊", center: [150, 360], path: "M 100,320 L 200,310 L 190,410 L 100,410 Z" },
            { id: "ptc-hc", name: "恆春半島", center: [230, 500], path: "M 150,420 L 310,400 L 250,590 L 160,570 Z" }
        ],
        "花蓮縣": [
            { id: "hun-hl", name: "花蓮市吉安", center: [310, 120], path: "M 250,90 L 370,90 L 350,160 L 260,160 Z" },
            { id: "hun-xf", name: "新城秀林", center: [240, 190], path: "M 150,100 L 320,100 L 280,280 L 160,260 Z" },
            { id: "hun-sf", name: "壽豐光復", center: [280, 310], path: "M 200,260 L 350,240 L 320,380 L 210,380 Z" },
            { id: "hun-yl", name: "玉里富里", center: [240, 480], path: "M 160,380 L 320,380 L 280,580 L 150,560 Z" }
        ],
        "臺東縣": [
            { id: "ttc-tt", name: "臺東市卑南", center: [260, 250], path: "M 180,200 L 320,200 L 290,320 L 190,320 Z" },
            { id: "ttc-cg", name: "成功長濱", center: [330, 120], path: "M 280,60 L 390,60 L 360,180 L 290,180 Z" },
            { id: "ttc-gs", name: "關山池上", center: [240, 110], path: "M 180,80 L 290,80 L 280,160 L 190,160 Z" },
            { id: "ttc-tml", name: "太麻里大武", center: [200, 420], path: "M 140,320 L 260,320 L 220,530 L 130,510 Z" }
        ]
    };

    let southEastState = {};

    function initAppState() {
        for (const county in southEastGeographicDB) {
            southEastState[county] = {};
            southEastGeographicDB[county].forEach(dist => {
                southEastState[county][dist.id] = 0;
            });
        }
    }

    function calculateGradientColor(val, min, max) {
        if (max === min || max === 0) return "#f1f5f9";
        const ratio = (val - min) / (max - min);
        const r = Math.round(241 + (17 - 241) * ratio);
        const g = Math.round(245 + (148 - 245) * ratio);
        const b = Math.round(249 + (136 - 249) * ratio);
        return `rgb(${r}, ${g}, ${b})`;
    }

    function updateHeatmap(county) {
        const values = Object.values(southEastState[county]);
        const max = Math.max(...values, 0);
        const min = Math.min(...values, 0);

        southEastGeographicDB[county].forEach(dist => {
            const polygon = document.getElementById(dist.id);
            if (polygon) {
                const val = southEastState[county][dist.id] || 0;
                polygon.setAttribute('fill', calculateGradientColor(val, min, max));
            }
        });
    }

    function renderInputPanel(county) {
        const tbody = document.getElementById('input-table-body');
        tbody.innerHTML = '';

        const sortedDistricts = [...southEastGeographicDB[county]].sort((a, b) => {
            return (southEastState[county][b.id] || 0) - (southEastState[county][a.id] || 0);
        });

        sortedDistricts.forEach(dist => {
            const tr = document.createElement('tr');
            const tdName = document.createElement('td');
            tdName.innerText = dist.name;
            tdName.style.fontWeight = '600';
            
            const tdInput = document.createElement('td');
            tdInput.style.textAlign = 'right';
            
            const input = document.createElement('input');
            input.type = 'number';
            input.className = 'allowance-input';
            input.value = southEastState[county][dist.id];
            
            input.oninput = (e) => {
                southEastState[county][dist.id] = parseFloat(e.target.value) || 0;
                updateHeatmap(county);
            };
            input.onblur = () => { renderInputPanel(county); };
            input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };

            tdInput.appendChild(input);
            tr.appendChild(tdName);
            tr.appendChild(tdInput);
            tbody.appendChild(tr);
        });
    }

    function renderSVGMap(county) {
        const featuresGroup = document.getElementById('map-features-group');
        const labelsGroup = document.getElementById('map-labels-group');
        const tooltip = document.getElementById('map-tooltip');
        
        featuresGroup.innerHTML = '';
        labelsGroup.innerHTML = '';
        document.getElementById('map-title').innerText = `${county} 真實地理鄰接拓撲圖`;

        southEastGeographicDB[county].forEach(dist => {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute('d', dist.path);
            path.setAttribute('id', dist.id);
            path.setAttribute('class', 'district-poly');
            path.setAttribute('fill', '#f1f5f9');
            
            path.onmousemove = (e) => {
                const currentVal = southEastState[county][dist.id] || 0;
                tooltip.style.display = 'block';
                tooltip.style.left = (e.offsetX + 15) + 'px';
                tooltip.style.top = (e.offsetY + 15) + 'px';
                tooltip.innerHTML = `<strong>${county} · ${dist.name}</strong><br>津貼金額：$${currentVal.toLocaleString()} 元`;
            };
            path.onmouseleave = () => { tooltip.style.display = 'none'; };

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute('x', dist.center[0]);
            text.setAttribute('y', dist.center[1]);
            text.setAttribute('class', 'map-label');
            text.textContent = dist.name;

            featuresGroup.appendChild(path);
            labelsGroup.appendChild(text);
        });

        updateHeatmap(county);
    }

    document.getElementById('county-select').onchange = (e) => {
        const selected = e.target.value;
        renderInputPanel(selected);
        renderSVGMap(selected);
    };

    // 啟動地圖系統
    initAppState();
    renderInputPanel("高雄市");
    renderSVGMap("高雄市");
</script>
</body>
</html>
