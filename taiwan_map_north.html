我已經為您的四個區域地圖檔案都注入了這個強大且簡單的 **「熱烘培下載系統」**：
1. 更新完成後，請先在您自己的電腦上雙擊打開 HTML 網頁。
2. 將所有金額填寫完畢。
3. 點選頂部的綠色 **「📥 下載此頁 (內置數據)」** 按鈕。
4. 網頁會自動為您下載一份已經「寫死並包裝好您當前設定數據」的同名 HTML 檔案。
5. 將下載下來的檔案**上傳覆蓋 GitHub 倉庫**，大家再點進網址，就能直接共享您預設填好的資料，同時各自依舊能自由操作！
