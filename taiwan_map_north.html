    let localState = {};

    function initAppState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                localState = JSON.parse(saved);
                for (const county in geographicDB) {
                    if (!localState[county]) localState[county] = {};
                    geographicDB[county].forEach(dist => {
                        if (localState[county][dist.id] === undefined) {
                            localState[county][dist.id] = 0;
                        }
                    });
                }
                return;
            } catch (e) {
                console.error("載入舊有數據失敗，重設中...", e);
            }
        }

        for (const county in geographicDB) {
            localState[county] = {};
            geographicDB[county].forEach(dist => {
                localState[county][dist.id] = 0;
            });
        }
    }

    function showToast(message, icon = "💾") {
        const toast = document.getElementById('toast');
        document.getElementById('toast-icon').innerText = icon;
        document.getElementById('toast-message').innerText = message;
        
        toast.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
        toast.classList.add('opacity-100', 'translate-y-0');
        
        setTimeout(() => {
            toast.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
            toast.classList.remove('opacity-100', 'translate-y-0');
        }, 2500);
    }

    let onConfirmAction = null;
    function openConfirmModal(onConfirm) {
        onConfirmAction = onConfirm;
        const modal = document.getElementById('confirm-modal');
        const box = document.getElementById('modal-box');
        
        modal.classList.remove('opacity-0', 'pointer-events-none');
        box.classList.remove('scale-90');
        box.classList.add('scale-100');
    }

    function closeConfirmModal() {
        const modal = document.getElementById('confirm-modal');
        const box = document.getElementById('modal-box');
        
        modal.classList.add('opacity-0', 'pointer-events-none');
        box.classList.remove('scale-100');
        box.classList.add('scale-90');
    }

    document.getElementById('confirm-yes-btn').onclick = () => {
        if (onConfirmAction) onConfirmAction();
        closeConfirmModal();
    };

    function triggerSave() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(localState));
        showToast("北部數據已成功儲存！", "✨");
    }

    function triggerReset() {
        openConfirmModal(() => {
            localStorage.removeItem(STORAGE_KEY);
            for (const county in geographicDB) {
                localState[county] = {};
                geographicDB[county].forEach(dist => {
                    localState[county][dist.id] = 0;
                });
            }
            const selected = document.getElementById('county-select').value;
            renderInputPanel(selected);
            renderSVGMap(selected);
            showToast("數據已成功重設！", "🧹");
        });
    }

    function calculateGradientColor(val, min, max) {
        if (max === min || max === 0) return "#f8fafc";
        const ratio = (val - min) / (max - min);
        const r = Math.round(241 + (17 - 241) * ratio);
        const g = Math.round(245 + (148 - 245) * ratio);
        const b = Math.round(249 + (136 - 249) * ratio);
        return `rgb(${r}, ${g}, ${b})`;
    }

    function updateHeatmap(county) {
        const values = Object.values(localState[county]);
        const max = Math.max(...values, 0);
        const min = Math.min(...values, 0);

        geographicDB[county].forEach(dist => {
            const polygon = document.getElementById(dist.id);
            if (polygon) {
                const val = localState[county][dist.id] || 0;
                polygon.setAttribute('fill', calculateGradientColor(val, min, max));
            }
            // 更新地圖上的數值標籤
            const valLabel = document.getElementById(`val-${dist.id}`);
            if (valLabel) {
                const val = localState[county][dist.id] || 0;
                valLabel.textContent = `$${val.toLocaleString()}`;
            }
        });
    }

    function renderInputPanel(county) {
        const tbody = document.getElementById('input-table-body');
        tbody.innerHTML = '';

        const sortedDistricts = [...geographicDB[county]].sort((a, b) => {
            return (localState[county][b.id] || 0) - (localState[county][a.id] || 0);
        });

        sortedDistricts.forEach(dist => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition-colors";
            
            const tdName = document.createElement('td');
            tdName.className = "px-4 py-3 text-sm font-semibold text-slate-700";
            tdName.innerText = dist.name;
            
            const tdInput = document.createElement('td');
            tdInput.className = "px-4 py-3 text-right";
            
            const input = document.createElement('input');
            input.type = 'number';
            input.className = 'w-28 bg-slate-50 border border-slate-200 focus:border-teal-500 focus:bg-white text-right px-3 py-1.5 rounded-lg text-sm font-semibold text-slate-800 transition-all outline-none focus:ring-2 focus:ring-teal-500/10';
            input.value = localState[county][dist.id] || 0;
            
            input.oninput = (e) => {
                localState[county][dist.id] = parseFloat(e.target.value) || 0;
                updateHeatmap(county);
            };
            input.onblur = () => { renderInputPanel(county); };
            input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };

            tdInput.appendChild(input);
            tr.appendChild(tdName);
            tr.appendChild(tdInput);
            tbody.appendChild(tr);
        });
    }

    function renderSVGMap(county) {
        const featuresGroup = document.getElementById('map-features-group');
        const labelsGroup = document.getElementById('map-labels-group');
        const tooltip = document.getElementById('map-tooltip');
        
        featuresGroup.innerHTML = '';
        labelsGroup.innerHTML = '';
        document.getElementById('map-title').innerText = `${county}真實地理分佈圖`;

        geographicDB[county].forEach(dist => {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute('d', dist.path);
            path.setAttribute('id', dist.id);
            path.setAttribute('class', 'stroke-white hover:stroke-slate-900 transition-all duration-200 cursor-pointer');
            path.setAttribute('stroke-width', '2');
            path.setAttribute('fill', '#f8fafc');
            
            path.onmousemove = (e) => {
                const currentVal = localState[county][dist.id] || 0;
                tooltip.classList.remove('hidden');
                tooltip.style.left = (e.offsetX + 15) + 'px';
                tooltip.style.top = (e.offsetY + 15) + 'px';
                tooltip.innerHTML = `<div class="font-bold text-slate-300 text-[10px] uppercase tracking-wider">${county}</div>
                                     <div class="text-sm font-extrabold mt-0.5">${dist.name}</div>
                                     <div class="text-xs text-teal-400 font-semibold mt-1">金額：$${currentVal.toLocaleString()} 元</div>`;
            };
            path.onmouseleave = () => { tooltip.classList.add('hidden'); };

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute('x', dist.center[0]);
            text.setAttribute('y', dist.center[1]);
            text.setAttribute('class', 'text-[11px] font-extrabold fill-slate-800 pointer-events-none text-center select-none');
            text.setAttribute('text-anchor', 'middle');
            text.setAttribute('dominant-baseline', 'middle');

            // 區域名稱子行
            const tspanName = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
            tspanName.setAttribute('x', dist.center[0]);
            tspanName.setAttribute('dy', '-5');
            tspanName.textContent = dist.name;

            // 金額數值子行
            const tspanVal = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
            tspanVal.setAttribute('x', dist.center[0]);
            tspanVal.setAttribute('dy', '13');
            tspanVal.setAttribute('id', `val-${dist.id}`);
            tspanVal.setAttribute('class', 'fill-slate-500 font-medium text-[9px]');
            tspanVal.textContent = `$${(localState[county][dist.id] || 0).toLocaleString()}`;

            text.appendChild(tspanName);
            text.appendChild(tspanVal);

            featuresGroup.appendChild(path);
            labelsGroup.appendChild(text);
        });

        updateHeatmap(county);
    }

    document.getElementById('county-select').onchange = (e) => {
        const selected = e.target.value;
        renderInputPanel(selected);
        renderSVGMap(selected);
    };

    initAppState();
    renderInputPanel("臺北市");
    renderSVGMap("臺北市");
</script>
</body>
</html>
