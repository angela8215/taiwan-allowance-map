<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SP 2026 各區津貼 VS 地理分佈系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🗺️</span>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">SP 2026 各區津貼 VS 地理分佈系統</h1>
            </div>
            <div class="flex items-center space-x-2 bg-teal-50 text-teal-700 px-3 py-1.5 rounded-full text-xs font-semibold">
                <span class="w-2 h-2 rounded-full bg-teal-500 animate-pulse"></span>
                <span>系統已上線 / 可進行編輯</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex-grow w-full">
        <div class="text-center max-w-3xl mx-auto mb-12">
            <h2 class="text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight sm:leading-none">
            </h2>
            <p class="mt-4 text-base sm:text-lg text-slate-500 leading-relaxed">
            </p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <!-- 北部地區 -->
            <a href="taiwan_map_north.html" class="group bg-white rounded-2xl border border-slate-200 p-6 shadow-sm hover:shadow-md hover:border-teal-500 transition-all duration-300 transform hover:-translate-y-1">
                <div class="w-12 h-12 rounded-xl bg-teal-100 flex items-center justify-center text-xl mb-4 group-hover:scale-110 transition-transform">
                    🏛️
                </div>
                <h3 class="text-lg font-bold text-slate-950 mb-2 group-hover:text-teal-600 transition-colors">北部地區地圖</h3>
                <p class="text-slate-500 text-sm leading-relaxed mb-4">包含：臺北市、新北市、桃園市、基隆市、新竹市、新竹縣、宜蘭縣。</p>
                <span class="text-xs font-semibold text-teal-600 flex items-center">
                    進入系統 <span class="ml-1 group-hover:translate-x-1 transition-transform">→</span>
                </span>
            </a>

            <!-- 中部地區 -->
            <a href="taiwan_map_central.html" class="group bg-white rounded-2xl border border-slate-200 p-6 shadow-sm hover:shadow-md hover:border-teal-500 transition-all duration-300 transform hover:-translate-y-1">
                <div class="w-12 h-12 rounded-xl bg-amber-100 flex items-center justify-center text-xl mb-4 group-hover:scale-110 transition-transform">
                    🪵
                </div>
                <h3 class="text-lg font-bold text-slate-950 mb-2 group-hover:text-teal-600 transition-colors">中部地區地圖</h3>
                <p class="text-slate-500 text-sm leading-relaxed mb-4">包含：苗栗縣、臺中市、彰化縣、南投縣、雲林縣。</p>
                <span class="text-xs font-semibold text-teal-600 flex items-center">
                    進入系統 <span class="ml-1 group-hover:translate-x-1 transition-transform">→</span>
                </span>
            </a>

            <!-- 南部及東部地區 -->
            <a href="taiwan_map_south_east.html" class="group bg-white rounded-2xl border border-slate-200 p-6 shadow-sm hover:shadow-md hover:border-teal-500 transition-all duration-300 transform hover:-translate-y-1">
                <div class="w-12 h-12 rounded-xl bg-orange-100 flex items-center justify-center text-xl mb-4 group-hover:scale-110 transition-transform">
                    ☀️
                </div>
                <h3 class="text-lg font-bold text-slate-950 mb-2 group-hover:text-teal-600 transition-colors">南部及東部地圖</h3>
                <p class="text-slate-500 text-sm leading-relaxed mb-4">包含：高雄市、臺南市、嘉義市、嘉義縣、屏東縣、花蓮縣、臺東縣。</p>
                <span class="text-xs font-semibold text-teal-600 flex items-center">
                    進入系統 <span class="ml-1 group-hover:translate-x-1 transition-transform">→</span>
                </span>
            </a>

            <!-- 外島地區 -->
            <a href="taiwan_map_islands.html" class="group bg-white rounded-2xl border border-slate-200 p-6 shadow-sm hover:shadow-md hover:border-teal-500 transition-all duration-300 transform hover:-translate-y-1">
                <div class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center text-xl mb-4 group-hover:scale-110 transition-transform">
                    🏝️
                </div>
                <h3 class="text-lg font-bold text-slate-950 mb-2 group-hover:text-teal-600 transition-colors">外島地區地圖</h3>
                <p class="text-slate-500 text-sm leading-relaxed mb-4">包含：澎湖縣、金門縣、連江縣。</p>
                <span class="text-xs font-semibold text-teal-600 flex items-center">
                    進入系統 <span class="ml-1 group-hover:translate-x-1 transition-transform">→</span>
                </span>
            </a>
        </div>

     
    <footer class="bg-white border-t border-slate-200 py-6 text-center text-xs text-slate-400">
        <div class="max-w-7xl mx-auto px-4">
            <p>© SP 2026 各區津貼 VS 地理分佈系統</p>
        </div>
    </footer>

</body>
</html>
