    function initAppState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                localState = JSON.parse(saved);

                for (const county in geographicDB) {

                            localState[county][dist.id] = 0;
                        }
                    });
                }
                return;
            } catch (e) {
                console.error("載入本機資料失敗，將採用預設設定...", e);
            }
        }

        // 當無本地儲存時，優先載入 INITIAL_DEFAULTS (熱烘培數據)，否則全歸 0
        for (const county in geographicDB) {
            localState[county] = {};
            geographicDB[county].forEach(dist => {
                if (INITIAL_DEFAULTS[county] && INITIAL_DEFAULTS[county][dist.id] !== undefined) {
                    localState[county][dist.id] = INITIAL_DEFAULTS[county][dist.id];
                } else {
                    localState[county][dist.id] = 0;
                }
            });
        }
    }

    function showToast(message, icon = "💾") {
        const toast = document.getElementById('toast');
        document.getElementById('toast-icon').innerText = icon;
        document.getElementById('toast-message').innerText = message;
        
        toast.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
        toast.classList.add('opacity-100', 'translate-y-0');
        
        setTimeout(() => {
            toast.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
            toast.classList.remove('opacity-100', 'translate-y-0');
        }, 2500);
    }

    let onConfirmAction = null;
    function openConfirmModal(onConfirm) {
        onConfirmAction = onConfirm;
        const modal = document.getElementById('confirm-modal');
        const box = document.getElementById('modal-box');
        
        modal.classList.remove('opacity-0', 'pointer-events-none');
        box.classList.remove('scale-90');
        box.classList.add('scale-100');
    }

    function closeConfirmModal() {
        const modal = document.getElementById('confirm-modal');
        const box = document.getElementById('modal-box');
        
        modal.classList.add('opacity-0', 'pointer-events-none');
        box.classList.remove('scale-100');
        box.classList.add('scale-90');
    }

    document.getElementById('confirm-yes-btn').onclick = () => {
        if (onConfirmAction) onConfirmAction();
        closeConfirmModal();
    };

    // --- 各大按鈕觸發事件 ---
    function triggerSave() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(localState));
        showToast("本區數據已成功儲存至快取！", "✨");
    }

    // 熱烘培下載打包功能
    function triggerDownloadHTML() {
        // 同步所有數字 input 的值至屬性，確保靜態下載後依然呈現
        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.setAttribute('value', input.value);
        });
        
        let htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        
        // 將當前的數據寫死至 INITIAL_DEFAULTS
        const stateString = JSON.stringify(localState, null, 4);
        const replacement = `/* INITIAL_DEFAULTS_START */\n    const INITIAL_DEFAULTS = ${stateString};\n    /* INITIAL_DEFAULTS_END */`;
        
        htmlContent = htmlContent.replace(/\/\* INITIAL_DEFAULTS_START \*\/[\s\S]*?\/\* INITIAL_DEFAULTS_END \*\//, replacement);
        
        const blob = new Blob([htmlContent], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "index.html"; // 導出為首頁名稱，方便直接丟 GitHub Pages
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showToast("已成功下載內置最新數據的整合站！請直接將此 index.html 覆蓋 GitHub 即可。", "📥");
    }

    function triggerReset() {
        openConfirmModal(() => {
            // 只清除當前選定區域的數據
            const region = appState.currentView;
            if (regionsConfig[region]) {
                regionsConfig[region].counties.forEach(county => {
                    localState[county] = {};
                    geographicDB[county].forEach(dist => {
                        localState[county][dist.id] = 0;
                    });
                });
                renderInputPanel(appState.currentCounty);
                renderSVGMap(appState.currentCounty);
                showToast("此分區數據已成功重設！", "🧹");
            }
        });
    }

    function calculateGradientColor(val, min, max) {
        if (max === min || max === 0) return "#f8fafc";
        const ratio = (val - min) / (max - min);
        // 優雅 Slate-100 (241, 245, 249) 至 Rose-700 (190, 18, 60)
        const r = Math.round(241 + (190 - 241) * ratio);
        const g = Math.round(245 + (18 - 245) * ratio);
        const b = Math.round(249 + (60 - 249) * ratio);
        return `rgb(${r}, ${g}, ${b})`;
    }

    function updateHeatmap(county) {
        const values = Object.values(localState[county]);
        const max = Math.max(...values, 0);
        const min = Math.min(...values, 0);

        geographicDB[county].forEach(dist => {
            const polygon = document.getElementById(dist.id);
            if (polygon) {
                const val = localState[county][dist.id] || 0;
                polygon.setAttribute('fill', calculateGradientColor(val, min, max));
            }
            // 更新地圖上的動態金額標籤
            const valLabel = document.getElementById(`val-${dist.id}`);
            if (valLabel) {
                const val = localState[county][dist.id] || 0;
                valLabel.textContent = `$${val.toLocaleString()}`;
            }
        });
    }

    function renderInputPanel(county) {
        const tbody = document.getElementById('input-table-body');
        tbody.innerHTML = '';

        // 依據金額高低即時自動排序
        const sortedDistricts = [...geographicDB[county]].sort((a, b) => {
            return (localState[county][b.id] || 0) - (localState[county][a.id] || 0);
        });

        sortedDistricts.forEach(dist => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition-colors";
            
            const tdName = document.createElement('td');
            tdName.className = "px-4 py-3 text-sm font-semibold text-slate-700";
            tdName.innerText = dist.name;
            
            const tdInput = document.createElement('td');
            tdInput.className = "px-4 py-3 text-right";
            
            const input = document.createElement('input');
            input.type = 'number';
            input.className = 'w-28 bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:bg-white text-right px-3 py-1.5 rounded-lg text-sm font-semibold text-slate-800 transition-all outline-none focus:ring-2 focus:ring-indigo-500/10';
            input.value = localState[county][dist.id] || 0;
            
            input.oninput = (e) => {
                localState[county][dist.id] = parseFloat(e.target.value) || 0;
                updateHeatmap(county);
            };
            input.onblur = () => { renderInputPanel(county); };
            input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };

            tdInput.appendChild(input);
            tr.appendChild(tdName);
            tr.appendChild(tdInput);
            tbody.appendChild(tr);
        });
    }

    function renderSVGMap(county) {
        const featuresGroup = document.getElementById('map-features-group');
        const labelsGroup = document.getElementById('map-labels-group');
        const tooltip = document.getElementById('map-tooltip');
        
        featuresGroup.innerHTML = '';
        labelsGroup.innerHTML = '';
        document.getElementById('map-title').innerText = `${county}真實地理分佈熱圖`;

        // 核心地理範圍動態 ViewBox 裁切 (Auto-Zoom)
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        geographicDB[county].forEach(dist => {
            const matches = dist.path.match(/[-+]?[0-9]*\.?[0-9]+/g);
            if (matches) {
                for (let i = 0; i < matches.length; i += 2) {
                    const x = parseFloat(matches[i]);
                    const y = parseFloat(matches[i+1]);
                    if (!isNaN(x)) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                    }
                    if (!isNaN(y)) {
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }
        });

        const width = maxX - minX;
        const height = maxY - minY;
        
        // 5% 的極窄基礎安全邊留白，乘上縮放滑桿比例 zoomFactor
        const basePaddingPercent = 0.05; 
        const paddedWidth = width * (1 + basePaddingPercent * 2);
        const paddedHeight = height * (1 + basePaddingPercent * 2);
        
        const centerX = minX + width / 2;
        const centerY = minY + height / 2;
        
        const zoomedWidth = paddedWidth / zoomFactor;
        const zoomedHeight = paddedHeight / zoomFactor;
        
        const newMinX = centerX - zoomedWidth / 2;
        const newMinY = centerY - zoomedHeight / 2;

        const svg = document.getElementById('taiwan-svg');
        if (svg && minX !== Infinity) {
            svg.setAttribute('viewBox', `${newMinX} ${newMinY} ${zoomedWidth} ${zoomedHeight}`);
        }

        // 渲染每個行政區圖層
        geographicDB[county].forEach(dist => {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute('d', dist.path);
            path.setAttribute('id', dist.id);
            path.setAttribute('class', 'stroke-white hover:stroke-slate-950 transition-all duration-200 cursor-pointer');
            path.setAttribute('stroke-width', '2');
            path.setAttribute('fill', '#f8fafc');
            
            // Tooltip 懸浮提示
            path.onmousemove = (e) => {
                const currentVal = localState[county][dist.id] || 0;
                tooltip.classList.remove('hidden');
                tooltip.style.left = (e.offsetX + 15) + 'px';
                tooltip.style.top = (e.offsetY + 15) + 'px';
                tooltip.innerHTML = `<div class="font-bold text-slate-300 text-[10px] uppercase tracking-wider">${county}</div>
                                     <div class="text-sm font-extrabold mt-0.5">${dist.name}</div>
                                     <div class="text-xs text-rose-400 font-semibold mt-1">目前金額：$${currentVal.toLocaleString()} 元</div>`;
            };
            path.onmouseleave = () => { tooltip.classList.add('hidden'); };

            // 地圖文字與金額標籤 (2 行 tspan 機制)
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute('x', dist.center[0]);
            text.setAttribute('y', dist.center[1]);
            text.setAttribute('class', 'text-[11px] font-extrabold fill-slate-800 pointer-events-none text-center select-none');
            text.setAttribute('text-anchor', 'middle');
            text.setAttribute('dominant-baseline', 'middle');

            const tspanName = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
            tspanName.setAttribute('x', dist.center[0]);
            tspanName.setAttribute('dy', '-5');
            tspanName.textContent = dist.name;

            const tspanVal = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
            tspanVal.setAttribute('x', dist.center[0]);
            tspanVal.setAttribute('dy', '13');
            tspanVal.setAttribute('id', `val-${dist.id}`);
            tspanVal.setAttribute('class', 'fill-slate-500 font-medium text-[9px]');
            tspanVal.textContent = `$${(localState[county][dist.id] || 0).toLocaleString()}`;

            text.appendChild(tspanName);
            text.appendChild(tspanVal);

            featuresGroup.appendChild(path);
            labelsGroup.appendChild(text);
        });

        // 刷新地圖漸層顏色
        updateHeatmap(county);
    }

    function navigateTo(viewName) {
        appState.currentView = viewName;
        
        const homeView = document.getElementById('view-home');
        const mapView = document.getElementById('view-map');
        const editorActions = document.getElementById('editor-actions');
        const homeActions = document.getElementById('home-actions');

        if (viewName === 'home') {
            // 切回首頁
            homeView.classList.remove('hidden');
            mapView.classList.add('hidden');
            editorActions.classList.add('hidden');
            homeActions.classList.remove('hidden');
        } else {
            // 切至指定區域地圖
            const config = regionsConfig[viewName];
            if (!config) return;

            homeView.classList.add('hidden');
            mapView.classList.remove('hidden');
            editorActions.classList.remove('hidden');
            homeActions.classList.add('hidden');

            // 更新路徑導航文字
            document.getElementById('breadcrumb-county').innerText = config.name;
            document.getElementById('panel-title').innerText = `${config.name}動態排行面版`;

            // 動態組裝當前分區的縣市下拉選單
            const select = document.getElementById('county-select');
            select.innerHTML = '';
            config.counties.forEach((county, idx) => {
                const opt = document.createElement('option');
                opt.value = county;
                opt.text = `${county}（完整地理拓撲）`;
                if (idx === 0) opt.selected = true;
                select.appendChild(opt);
            });

            // 預設載入選單的第一個縣市
            appState.currentCounty = config.counties[0];
            renderInputPanel(appState.currentCounty);
            renderSVGMap(appState.currentCounty);
        }
    }

    // 縣市切換監聽
    document.getElementById('county-select').onchange = (e) => {
        appState.currentCounty = e.target.value;
        renderInputPanel(appState.currentCounty);
        renderSVGMap(appState.currentCounty);
    };

    // 縮放滑桿控制
    document.getElementById('zoom-slider').oninput = (e) => {
        zoomFactor = parseFloat(e.target.value);
        document.getElementById('zoom-val').innerText = `${Math.round(zoomFactor * 100)}%`;
        renderSVGMap(appState.currentCounty);
    };

    // 初始化網頁
    initAppState();
    navigateTo('home');
</script>
</body>
</html>
