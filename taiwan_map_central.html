<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SP 2026 中部津貼地圖系統</title>
    <!-- 導入 Tailwind CSS 提供精美現代化 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Microsoft JhengHei", sans-serif;
        }
        .data-table-container {
            height: calc(100vh - 220px);
            overflow-y: auto;
        }
        /* 隱藏滾動條但保持功能 */
        .data-table-container::-webkit-scrollbar {
            width: 6px;
        }
        .data-table-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .data-table-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        /* 地圖元件特效 */
        .district-poly {
            stroke: #ffffff;
            stroke-width: 1.8;
            transition: fill 0.25s ease, stroke 0.2s ease, filter 0.2s ease;
            cursor: pointer;
        }
        .district-poly:hover {
            stroke: #0f172a;
            stroke-width: 2.8;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.15));
        }
        /* 文字高對比描邊 */
        .map-label {
            font-weight: 800;
            fill: #0f172a;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }
        .tspan-name {
            font-size: 13px;
            stroke: #ffffff;
            stroke-width: 3px;
            paint-order: stroke fill;
        }
        .tspan-val {
            font-size: 11px;
            fill: #be123c;
            stroke: #ffffff;
            stroke-width: 3px;
            paint-order: stroke fill;
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700 min-h-screen flex flex-col">

    <!-- 頂部高階整合控制列 -->
    <header class="bg-indigo-900 text-white shadow-md px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 sticky top-0 z-40">
        <div class="flex items-center gap-4">
            <a href="index.html" class="flex items-center gap-2 bg-indigo-800 hover:bg-indigo-700 px-4 py-2 rounded-lg text-sm font-semibold transition shadow-sm border border-indigo-700">
                <span>⬅ 返回首頁導覽</span>
            </a>
            <h1 class="text-xl font-bold tracking-wide flex items-center gap-2">
                <span>📊 中部地區津貼數據儀表板</span>
            </h1>
        </div>
        
        <!-- 操作按鈕群 -->
        <div class="flex items-center flex-wrap gap-2">
            <button onclick="saveToStorage()" class="flex items-center gap-1 bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-sm font-semibold transition shadow-sm">
                <span>💾 儲存數據</span>
            </button>
            <button onclick="triggerResetModal()" class="flex items-center gap-1 bg-rose-600 hover:bg-rose-500 px-4 py-2 rounded-lg text-sm font-semibold transition shadow-sm">
                <span>🧹 重設數據</span>
            </button>
            <button onclick="exportBakingHTML()" class="flex items-center gap-1 bg-amber-500 hover:bg-amber-400 text-slate-900 px-4 py-2 rounded-lg text-sm font-semibold transition shadow-sm">
                <span>📊 匯出數據</span>
            </button>
        </div>
    </header>

    <!-- 主程式容器 -->
    <main class="flex-grow p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 max-w-[1600px] w-full mx-auto">
        
        <!-- 左側設定面版 -->
        <div class="lg:col-span-4 bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col h-[calc(100vh-120px)]">
            <div class="mb-4">
                <label for="county-select" class="block font-bold text-slate-700 mb-2 text-sm">請選擇中部縣市：</label>
                <select id="county-select" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-base font-semibold text-slate-800 focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition cursor-pointer">
                    <option value="苗栗縣" selected>苗栗縣</option>
                    <option value="臺中市">臺中市</option>
                    <option value="彰化縣">彰化縣</option>
                    <option value="南投縣">南投縣</option>
                    <option value="雲林縣">雲林縣</option>
                </select>
            </div>
            
            <div class="flex justify-between items-center pb-2 mb-2 border-b border-slate-100">
                <span class="font-bold text-slate-800 text-sm">各行政區金額微調排名</span>
                <span class="text-xs text-slate-400">輸入後即時更新地圖</span>
            </div>

            <!-- 排行列表 -->
            <div class="data-table-container">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs font-bold sticky top-0 z-10 border-b border-slate-200">
                            <th class="p-3">行政區</th>
                            <th class="p-3 text-right">津貼金額 (元)</th>
                        </tr>
                    </thead>
                    <tbody id="input-table-body" class="divide-y divide-slate-100 text-sm">
                        <!-- 動態插入 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 右側真實地圖展示區塊 -->
        <div class="lg:col-span-8 bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col h-[calc(100vh-120px)] relative">
            
            <!-- 地圖輔助控制列 -->
            <div class="flex flex-col sm:flex-row justify-between items-stretch sm:items-center gap-3 pb-4 mb-4 border-b border-slate-100">
                <div>
                    <h2 id="map-title" class="text-lg font-bold text-slate-800">中部區域地理位置圖</h2>
                    <p class="text-xs text-slate-400 mt-0.5">數據越高，紅色漸層越深</p>
                </div>
                
                <!-- 縮放控制器與圖例 -->
                <div class="flex items-center flex-wrap gap-4">
                    <!-- 🔍 無級變倍縮放滑桿 -->
                    <div class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-200">
                        <span class="text-xs font-bold text-slate-500 flex items-center gap-1">🔍 放大</span>
                        <input type="range" id="zoom-slider" min="60" max="300" value="130" class="w-24 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                        <span id="zoom-text" class="text-xs font-mono font-bold text-slate-600 w-10 text-right">130%</span>
                    </div>

                    <div class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-200 text-xs font-medium">
                        <span class="text-slate-400">低金額</span>
                        <div class="w-24 h-2.5 bg-gradient-to-right rounded-full border border-slate-300" style="background: linear-gradient(to right, #f8fafc, #be123c);"></div>
                        <span class="text-rose-700 font-bold">高金額</span>
                    </div>
                </div>
            </div>

            <!-- SVG 畫布包裹層 -->
            <div class="flex-grow bg-slate-50 border border-slate-100 rounded-xl overflow-hidden relative flex justify-center items-center p-4">
                <div id="map-zoom-container" style="transform: scale(1.3); transition: transform 0.15s ease-out; transform-origin: center center;" class="w-full h-full flex justify-center items-center">
                    <svg id="taiwan-svg" viewBox="0 0 600 600" class="w-full h-full max-h-[65vh]">
                        <g id="map-features-group"></g>
                        <g id="map-labels-group"></g>
                    </svg>
                </div>
            </div>

            <div id="map-tooltip" class="absolute pointer-events-none bg-slate-900/95 text-white text-xs px-3 py-2.5 rounded-xl shadow-xl border border-slate-700/50 hidden z-50 transition-all duration-75"></div>
        </div>
    </main>

    <!-- 客製化彈出對話框 (Modal & Toast) -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex justify-center items-center hidden">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border border-slate-100 scale-95 transition-transform duration-300 mx-4">
            <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">⚠️ 安全重設防呆警告</h3>
            <p class="text-sm text-slate-500 mt-3 leading-relaxed">這個動作將會把您在當前網頁設定的「中部所有行政區數據」完全歸零，並清除快取記憶，此動作無法復原。請問您確定要重設嗎？</p>
            <div class="flex justify-end gap-2 mt-6">

        </div>
    </div>

                { id: "yun-dp", name: "大埤鄉", center: [265, 275], path: "M 230,250 L 295,250 L 285,310 L 230,310 Z" },
                { id: "yun-ct", name: "莿桐鄉", center: [290, 140], path: "M 260,110 L 320,115 L 310,170 L 255,160 Z" },
                { id: "yun-ln", name: "林內鄉", center: [355, 120], path: "M 320,95 L 380,100 L 370,145 L 320,140 Z" },
                { id: "yun-el", name: "二崙鄉", center: [155, 125], path: "M 115,110 L 185,110 L 180,145 L 120,145 Z" },
                { id: "yun-lb", name: "崙背鄉", center: [115, 160], path: "M 80,140 L 140,140 L 130,185 L 85,185 Z" },
                { id: "yun-ml", name: "麥寮鄉", center: [65, 125], path: "M 30,110 L 95,110 L 85,150 L 35,140 Z" },
                { id: "yun-ds", name: "東勢鄉", center: [75, 215], path: "M 45,190 L 105,190 L 95,240 L 45,240 Z" },
                { id: "yun-bz", name: "褒忠鄉", center: [135, 205], path: "M 105,185 L 165,185 L 155,230 L 105,230 Z" },
                { id: "yun-ts", name: "臺西鄉", center: [35, 185], path: "M 10,150 L 55,150 L 50,225 L 10,225 Z" },
                { id: "yun-yc-town", name: "元長鄉", center: [155, 280], path: "M 115,240 L 185,240 L 175,320 L 115,320 Z" },
                { id: "yun-sh", name: "四湖鄉", center: [45, 285], path: "M 15,245 L 75,245 L 65,335 L 15,335 Z" },
                { id: "yun-kh", name: "口湖鄉", center: [45, 385], path: "M 15,335 L 75,335 L 65,435 L 15,435 Z" },
                { id: "yun-sl-town", name: "水林鄉", center: [105, 415], path: "M 75,355 L 135,355 L 125,465 L 75,465 Z" }
            ]
        };

        // 核心注入：將注入點包裹在預設模板中
        // INJECT_START
        let centralState = {};
        // INJECT_END

        // 初始化狀態（檢查 localStorage 是否有儲存紀錄）
        function initAppState() {
            const savedData = localStorage.getItem('central_allowance_data');
            if (savedData) {
                try {
                    centralState = JSON.parse(savedData);
                } catch(e) {
                    buildFreshState();
                }
            } else if (Object.keys(centralState).length === 0) {
                buildFreshState();
            }
            
            // 雙向防呆：確保各縣市結構存在
            for (const county in centralGeographicDB) {
                if (!centralState[county]) centralState[county] = {};
                centralGeographicDB[county].forEach(dist => {
                    if (centralState[county][dist.id] === undefined) {
                        centralState[county][dist.id] = 0;
                    }
                });
            }
        }

        function buildFreshState() {
            centralState = {};
            for (const county in centralGeographicDB) {
                centralState[county] = {};
                centralGeographicDB[county].forEach(dist => {
                    centralState[county][dist.id] = 0;
                });
            }
        }

        // 計算高雅玫瑰紅 (Rose-700 Base) 的動態色譜漸層
        function calculateGradientColor(val, min, max) {
            if (max === min || max === 0 || val === 0) return "#f8fafc";
            const ratio = (val - min) / (max - min);
            // 灰色 Slate-50 (#f8fafc) 漸變至 玫瑰紅 Rose-700 (#be123c)
            const r = Math.round(248 + (190 - 248) * ratio);
            const g = Math.round(250 + (18 - 250) * ratio);
            const b = Math.round(252 + (60 - 252) * ratio);
            return `rgb(${r}, ${g}, ${b})`;
        }

        // 即時局部重繪地圖熱力圖
        function updateHeatmap(county) {
            const values = Object.values(centralState[county]);
            const max = Math.max(...values, 0);
            const min = 0; // 設定以 0 為基底

            centralGeographicDB[county].forEach(dist => {
                const polygon = document.getElementById(dist.id);
                if (polygon) {
                    const val = centralState[county][dist.id] || 0;
                    polygon.setAttribute('fill', calculateGradientColor(val, min, max));
                }
                
                // 動態同步地圖上的金額數字文字層
                const textValSpan = document.getElementById(`lbl-val-${dist.id}`);
                if (textValSpan) {
                    const currentVal = centralState[county][dist.id] || 0;
                    textValSpan.textContent = currentVal > 0 ? `$${currentVal.toLocaleString()}` : '';
                }
            });
        }

        // 渲染左側排行微調輸入面板
        function renderInputPanel(county) {
            const tbody = document.getElementById('input-table-body');
            tbody.innerHTML = '';

            const sortedDistricts = [...centralGeographicDB[county]].sort((a, b) => {
                return (centralState[county][b.id] || 0) - (centralState[county][a.id] || 0);
            });

            sortedDistricts.forEach(dist => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition duration-150";
                
                const tdName = document.createElement('td');
                tdName.className = "p-3 font-semibold text-slate-700";
                tdName.innerText = dist.name;
                
                const tdInput = document.createElement('td');
                tdInput.className = "p-3 text-right";
                
                const input = document.createElement('input');
                input.type = 'number';
                input.className = 'w-32 bg-slate-50 border border-slate-200 text-slate-800 text-right rounded-lg px-2.5 py-1.5 font-semibold text-sm focus:outline-none focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 transition';
                input.value = centralState[county][dist.id];
                
                input.oninput = (e) => {
                    centralState[county][dist.id] = parseFloat(e.target.value) || 0;
                    updateHeatmap(county);
                };
                // 當失去焦點時，依照最新大小數值重新洗牌排行
                input.onblur = () => { renderInputPanel(county); };
                input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };

                tdInput.appendChild(input);
                tr.appendChild(tdName);
                tr.appendChild(tdInput);
                tbody.appendChild(tr);
            });
        }

        // 渲染 SVG 地圖與標籤
        function renderSVGMap(county) {
            const featuresGroup = document.getElementById('map-features-group');
            const labelsGroup = document.getElementById('map-labels-group');
            const tooltip = document.getElementById('map-tooltip');
            
            featuresGroup.innerHTML = '';
            labelsGroup.innerHTML = '';
            document.getElementById('map-title').innerText = `${county} 中部區域地理位置圖`;

            centralGeographicDB[county].forEach(dist => {
                // 生成多邊形 Path 節點
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute('d', dist.path);
                path.setAttribute('id', dist.id);
                path.setAttribute('class', 'district-poly');
                path.setAttribute('fill', '#f8fafc');
                
                // 滑鼠提示懸浮事件
                path.onmousemove = (e) => {
                    const currentVal = centralState[county][dist.id] || 0;
                    tooltip.style.display = 'block';
                    tooltip.style.left = (e.clientX + 15) + 'px';
                    tooltip.style.top = (e.clientY + 15) + 'px';
                    tooltip.innerHTML = `
                        <div class="font-bold text-slate-200 text-xs">${county}</div>
                        <div class="text-sm font-extrabold text-white mt-0.5">${dist.name}</div>
                        <div class="text-rose-400 font-mono font-bold mt-1 border-t border-slate-700 pt-1">金額：$${currentVal.toLocaleString()} 元</div>
                    `;
                };
                path.onmouseleave = () => { tooltip.style.display = 'none'; };

                // 使用 SVG text 與換行 tspan 技術顯示區名與即時動態金額
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute('x', dist.center[0]);
                text.setAttribute('y', dist.center[1]);
                text.setAttribute('class', 'map-label');

                // 區名 tspan
                const tspanName = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                tspanName.setAttribute('x', dist.center[0]);
                tspanName.setAttribute('dy', '-4');
                tspanName.setAttribute('class', 'tspan-name');
                tspanName.textContent = dist.name;

                // 金額數字 tspan
                const tspanVal = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                tspanVal.setAttribute('x', dist.center[0]);
                tspanVal.setAttribute('dy', '14');
                tspanVal.setAttribute('id', `lbl-val-${dist.id}`);
                tspanVal.setAttribute('class', 'tspan-val');
                tspanVal.textContent = '';

                text.appendChild(tspanName);
                text.appendChild(tspanVal);

                featuresGroup.appendChild(path);
                labelsGroup.appendChild(text);
            });

            updateHeatmap(county);
        }

        // ⚙️ 儲存數據至 LocalStorage
        function saveToStorage() {
            localStorage.setItem('central_allowance_data', JSON.stringify(centralState));
            showToastNotify("✨ 中部資料儲存成功！");
        }

        // 🧹 重設防呆 Modal 控制
        function triggerResetModal() {
            document.getElementById('confirm-modal').classList.remove('hidden');
        }
        function closeResetModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
        }
        function executeResetData() {
            buildFreshState();
            localStorage.removeItem('central_allowance_data');
            const currentCounty = document.getElementById('county-select').value;
            renderInputPanel(currentCounty);
            renderSVGMap(currentCounty);
            closeResetModal();
            showToastNotify("🧹 數據已全數成功清空歸零！");
        }

        // 📊 匯出數據 (自動烘培最新資料並下載全頁面)
        function exportBakingHTML() {
            const currentCode = document.documentElement.outerHTML;
            const stateString = JSON.stringify(centralState, null, 2);
            
            // 尋找模板標籤位置，置換為最新編輯完畢的真實數值結構
            const regex = /\/\/ INJECT_START[\s\S]*?\/\/ INJECT_END/;
            const newCode = currentCode.replace(regex, `// INJECT_START\n        let centralState = ${stateString};\n        // INJECT_END`);
            
            const blob = new Blob(["<!DOCTYPE html>\n" + newCode], { type: "text/html;charset=utf-8" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "taiwan_map_central.html";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToastNotify("📊 數據已成功匯出為新網頁檔！");
        }

        // 輕量 Toast 彈窗提示
        function showToastNotify(msg) {
            const toast = document.getElementById('toast-notify');
            document.getElementById('toast-message').textContent = msg;
            toast.classList.remove('translate-y-10', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
            }, 2500);
        }

        // 監聽縣市下拉切換
        document.getElementById('county-select').onchange = (e) => {
            const selected = e.target.value;
            renderInputPanel(selected);
            renderSVGMap(selected);
        };

        // 🔍 縮放滑桿核心連動
        const zoomSlider = document.getElementById('zoom-slider');
        const zoomText = document.getElementById('zoom-text');
        const zoomContainer = document.getElementById('map-zoom-container');

        zoomSlider.oninput = (e) => {
            const val = e.target.value;
            zoomText.textContent = `${val}%`;
            zoomContainer.style.transform = `scale(${val / 100})`;
        };

        // 啟動地圖系統
        initAppState();
        const initialCounty = document.getElementById('county-select').value;
        renderInputPanel(initialCounty);
        renderSVGMap(initialCounty);
    </script>
</body>
