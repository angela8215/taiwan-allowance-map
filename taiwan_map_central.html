<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣真實地理邊界地圖</title>
    <!-- 導入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 導入 Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { height: calc(100vh - 80px); width: 100%; }
        
        /* 真實行政區邊界特效 */
        .district-poly {
            transition: fill-opacity 0.2s, stroke-width 0.2s;
        }
    </style>
</head>
<body class="bg-slate-100 flex flex-col h-screen">

    <!-- 頂部標題與說明 -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center h-[80px]">
        <div>
            <h1 class="text-xl font-bold">台灣真實地理邊界地圖</h1>
            <p class="text-xs opacity-90">基於真實 GeoJSON 邊界與模擬津貼數據著色</p>
        </div>
        <div class="text-sm bg-blue-700 px-3 py-1.5 rounded">
            滑鼠懸停可高亮，點擊可看詳細資訊
        </div>
    </header>

    <!-- 地圖容器 -->
    <div id="map"></div>

    <script>
        // 1. 初始化地圖（設定中心點在台灣中部）
        const map = L.map('map').setView([23.6, 121.0], 8);

        // 2. 載入底圖 (使用 CartoDB 乾淨的淺色底圖，更適合凸顯資料)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);

        // 3. 模擬各縣市的津貼金額數據（對照 GeoJSON 中的 COUNTYNAME 欄位）
        const allowanceData = {
            "臺北市": 5000, "新北市": 4500, "桃園市": 4000, "臺中市": 3500,
            "臺南市": 3000, "高雄市": 4800, "基隆市": 2500, "新竹市": 5000,
            "新竹縣": 3000, "苗栗縣": 1500, "彰化縣": 2000, "南投縣": 1800,
            "雲林縣": 2200, "嘉義市": 2800, "嘉義縣": 1600, "屏東縣": 2000,
            "宜蘭縣": 2500, "花蓮縣": 3000, "臺東縣": 3200, "澎湖縣": 4000,
            "金門縣": 6000, "連江縣": 6500
        };

        // 4. 根據津貼金額決定填滿顏色的函式
        function getColor(amount) {
            if (!amount) return '#cbd5e1'; // 沒數據時顯灰色
            return amount > 5000 ? '#1d4ed8' : // 深藍
                   amount > 4000 ? '#3b82f6' : // 藍
                   amount > 3000 ? '#60a5fa' : // 淺藍
                   amount > 2000 ? '#93c5fd' : // 極淺藍
                                   '#dbeafe';   // 粉藍
        }

        // 5. 異步載入 g0v 的 台灣縣市邊界 GeoJSON
        const geojsonUrl = 'https://raw.githubusercontent.com/g0v/twgeojson/master/json/twCounty2010.json';

        fetch(geojsonUrl)
            .then(response => {
                if (!response.ok) throw new Error('無法取得地圖資料');
                return response.json();
            })
            .then(geojsonData => {
                let geojsonLayer = L.geoJSON(geojsonData, {
                    // 設定每個多邊形（縣市）的初始樣式
                    style: function(feature) {
                        // 讀取該行政區名稱（注意：此 GeoJSON 欄位為 COUNTYNAME）
                        const countyName = feature.properties.COUNTYNAME;
                        const amount = allowanceData[countyName] || 0;

                        return {
                            fillColor: getColor(amount),
                            weight: 1.5,
                            opacity: 1,
                            color: '#ffffff', // 邊界線顏色（白色）
                            fillOpacity: 0.75,
                            className: 'district-poly' // 綁定 CSS class 方便做轉場
                        };
                    },
                    // 綁定每個行政區的互動事件
                    onEachFeature: function(feature, layer) {
                        const countyName = feature.properties.COUNTYNAME;
                        const amount = allowanceData[countyName] || "無數據";

                        // 滑鼠互動效果
                        layer.on({
                            mouseover: function(e) {
                                const target = e.target;
                                target.setStyle({
                                    weight: 3,
                                    color: '#1e293b', // 滑鼠懸停時邊界變深灰色
                                    fillOpacity: 0.9
                                });
                                target.bringToFront(); // 將當前高亮的區域移到最上層
                            },
                            mouseout: function(e) {
                                geojsonLayer.resetStyle(e.target); // 滑鼠移開還原樣式
                            },
                            click: function(e) {
                                // 點擊時在地圖中心彈出資訊
                                layer.bindPopup(`
                                    <div class="p-1">
                                        <h3 class="text-base font-bold text-gray-800">${countyName}</h3>
                                        <hr class="my-1">
                                        <p class="text-sm text-gray-600">目前補助津貼：<strong class="text-blue-600">${amount}</strong> 元</p>
                                    </div>
                                `).openPopup(e.latlng);
                            }
                        });
                    }
                }).addTo(map);
            })
            .catch(error => {
                console.error('載入地圖發生錯誤:', error);
                alert('地圖圖資載入失敗，請確認網路連線是否正常。');
            });
    </script>
</body>
</html>
